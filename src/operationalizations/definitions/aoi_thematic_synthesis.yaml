engine_key: aoi_thematic_synthesis
engine_name: AOI Thematic Synthesis
stance_operationalizations:
- stance_key: discovery
  label: Source Theme Discovery
  description: |-
    Discover the major themes that recur across the selected source thinker corpus.
    Separate durable themes from incidental topics, keep the thinker fixed, and
    preserve a clear inventory of the source documents that materially ground each
    theme. This pass should establish the stable thematic coordinates that the rest
    of the AOI workflow will inherit.
  focus_dimensions:
  - theme_inventory
  focus_capabilities:
  - synthesize_themes
  - preserve_provenance
- stance_key: inference
  label: Claim Structure Reconstruction
  description: |-
    With the initial theme inventory in hand, reconstruct what each theme actually
    means inside the source corpus. Separate key claims, philosophical commitments,
    and argumentative moves, and clarify where closely related themes diverge or
    sit in tension. Preserve provenance while making the thematic map more precise.
  focus_dimensions:
  - claim_structure
  focus_capabilities:
  - synthesize_themes
  - preserve_provenance
- stance_key: integration
  label: AOI Baseline Synthesis
  description: |-
    Integrate the discovered themes and reconstructed claim structures into the
    bounded source-thinker baseline for downstream AOI work. The result should be
    a coherent thematic synthesis with stable source-document coverage that later
    engagement mapping and sin-finding passes can consume without reopening thinker
    identification or corpus scoping.
  focus_dimensions:
  - theme_inventory
  - claim_structure
  focus_capabilities:
  - synthesize_themes
  - preserve_provenance
depth_sequences:
- depth_key: surface
  passes:
  - pass_number: 1
    stance_key: discovery
    consumes_from: []
- depth_key: standard
  passes:
  - pass_number: 1
    stance_key: discovery
    consumes_from: []
  - pass_number: 2
    stance_key: integration
    consumes_from:
    - 1
- depth_key: deep
  passes:
  - pass_number: 1
    stance_key: discovery
    consumes_from: []
  - pass_number: 2
    stance_key: inference
    consumes_from:
    - 1
  - pass_number: 3
    stance_key: integration
    consumes_from:
    - 1
    - 2
