engine_key: aoi_thematic_report
engine_name: AOI Thematic Report
version: 1
category: scholarly
kind: synthesis
problematique: |
  The final AOI task is not to restate the findings one by one but to draw a
  bounded interpretive conclusion from them. What is the overall engagement
  pattern? Which divergences matter most? What does the resulting AOI portrait
  imply about how a reader should interpret the subject author's use of the
  selected source thinker?

  This engine produces a structured thematic report suitable for an inspectable
  reading surface. It must remain faithful to the upstream theme inventory,
  engagement map, and flat finding set while distilling them into a coherent
  report that remains legible inside analyzer-v2's existing presentation grammar.
researcher_question: What bounded AOI report best summarizes the thematic relationship between the subject corpus and the selected source thinker?
intellectual_lineage:
  primary:
    name: berlin
    description: Intellectual history matters because the stakes of misreading and appropriation lie in what readers are led to think and do.
  secondary:
    - name: bloom
      description: Influence is summarized here as an agonistic pattern rather than a neutral bibliography.
  traditions:
    - name: intellectual_history
      description: Report synthesis links textual detail to larger interpretive consequences.
  key_concepts:
    - name: bounded_closeout
      definition: A synthesis that distills the AOI findings without claiming more than the evidence supports.
analytical_dimensions:
  - key: summary
    description: Summarize the overall AOI result clearly enough to orient a reader.
    probing_questions:
      - What is the engagement pattern overall?
      - Which divergences matter most?
    depth_guidance:
      surface: Short summary plus the most important implication.
      standard: Clear summary, divergence highlights, and reading implications.
      deep: More nuanced synthesis across engagement and sin distributions.
capabilities:
  - key: synthesize_report_sections
    description: Produce a structured AOI report broken into reusable sections.
    depth_scaling:
      surface: Summary plus one or two structured support sections.
      standard: Full structured report sections for presentation.
      deep: Fuller structured report with stronger nuance and implication.
composability:
  shares_with:
    report: Structured report sections for the final AOI report view.
  consumes_from:
    themes: Requires the theme inventory.
    engagements: Requires the engagement map.
    findings: Requires the flat AOI findings and grouped distributions.
  synergy_engines: []
depth_levels:
  - key: surface
    description: Concise AOI closeout.
    typical_passes: 1
    suitable_for: Fast summary mode.
  - key: standard
    description: Structured AOI closeout with summary, divergences, distribution, and implications.
    typical_passes: 1
    suitable_for: Default final report for the single-thinker tranche.
  - key: deep
    description: More nuanced AOI closeout with fuller interpretive framing.
    typical_passes: 1
    suitable_for: Richer end-state report when the findings warrant it.
apps:
  - critic
function: influence
output_mode: json
prompt_context_keys:
  - aoi_sin_type_enum
output_contract:
  report_sections:
    summary: "string"
    engagement_pattern: "string"
    key_divergences:
      - title: "string"
        subtitle: "string"
        description: "string"
        badge: "critical | high | medium | low"
    sin_distribution:
      - sin_type: "string"
        count: 0
        description: "string"
    reading_implications: "string"
